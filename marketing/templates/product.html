<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{brand.name}} — {{eyebrow}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
  :root {
    --c1: {{brand.accent1}};
    --c2: {{brand.accent2}};
    --bg: {{brand.bg}};
    --text: #FFFFFF;
    --muted: #4A5A7A;
    --line: rgba(107,79,255,0.2);
    --grad: linear-gradient(135deg, {{brand.accent1}} 0%, {{brand.accent2}} 100%);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#060810; display:flex; justify-content:center; padding:48px 24px; font-family:'Inter',sans-serif; }
  .poster { width:1080px; height:1350px; background:var(--bg); position:relative; overflow:hidden; }
  .poster::before { content:''; position:absolute; inset:0; background-image:radial-gradient(circle,rgba(107,79,255,0.15) 1px,transparent 1px); background-size:55px 55px; }
  .glow-tl { position:absolute; top:-180px; left:-180px; width:600px; height:600px; background:radial-gradient(ellipse,rgba(0,200,255,0.08) 0%,transparent 65%); }
  .glow-br { position:absolute; bottom:-150px; right:-150px; width:700px; height:700px; background:radial-gradient(ellipse,rgba(107,79,255,0.1) 0%,transparent 65%); }
  .divider { position:absolute; top:834px; left:89px; right:89px; height:1px; background:linear-gradient(90deg,transparent,rgba(107,79,255,0.4),rgba(0,200,255,0.4),transparent); z-index:2; }
  .inner { position:relative; z-index:3; width:668px; margin:0 auto; height:1350px; display:flex; flex-direction:column; padding:70px 0 60px; }

  /* TOP */
  .top { height:834px; display:flex; flex-direction:column; justify-content:center; padding-bottom:34px; }
  .logo-wrap { display:flex; align-items:center; gap:14px; margin-bottom:55px; }
  .logo-img { width:64px; height:64px; border-radius:50%; object-fit:cover; flex-shrink:0; }
  .logo-text { font-size:22px; font-weight:700; color:var(--text); }
  .logo-text span { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .logo-sub { font-size:11px; color:var(--muted); letter-spacing:0.18em; text-transform:uppercase; margin-top:2px; }
  .eyebrow { font-size:12px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; margin-bottom:28px; display:flex; align-items:center; gap:10px; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .eyebrow::before { content:''; display:block; width:28px; height:2px; background:var(--grad); flex-shrink:0; -webkit-text-fill-color:initial; }
  h1 { font-size:82px; font-weight:900; line-height:0.95; color:var(--text); letter-spacing:-0.03em; margin-bottom:34px; white-space:pre-line; }
  h1 em { font-style:normal; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .sub { font-size:17px; font-weight:300; color:var(--muted); line-height:1.7; max-width:500px; }
  .sub strong { color:var(--text); font-weight:400; }

  /* BOTTOM */
  .bottom { height:413px; display:flex; flex-direction:column; justify-content:center; gap:50px; }
  .pillars { display:flex; }
  .pillar { flex:1; padding-right:34px; border-right:1px solid var(--line); }
  .pillar:last-child { border-right:none; padding-right:0; padding-left:34px; }
  .pillar:nth-child(2) { padding-left:34px; }
  .pillar-num { font-size:40px; font-weight:900; line-height:1; margin-bottom:8px; letter-spacing:-0.02em; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .pillar-label { font-size:12px; font-weight:700; color:var(--text); margin-bottom:6px; letter-spacing:0.08em; text-transform:uppercase; }
  .pillar-desc { font-size:13px; color:var(--muted); line-height:1.55; }
  .cta-row { display:flex; align-items:center; justify-content:space-between; }
  .cta-btn { display:inline-flex; align-items:center; gap:10px; background:var(--grad); color:#fff; font-size:15px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; padding:16px 36px; border-radius:8px; text-decoration:none; box-shadow:0 0 40px rgba(107,79,255,0.35); }
  .tg-handle { font-size:13px; color:var(--muted); letter-spacing:0.08em; }
</style>
</head>
<body>
<div class="poster">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="divider"></div>
  <div class="inner">
    <div class="top">
      <div class="logo-wrap">
        <img class="logo-img" src="../logo.png" alt="Logo" onerror="this.style.display='none'">
        <div>
          <div class="logo-text">{{brand.name}}<span> AI</span></div>
          <div class="logo-sub">{{brand.tagline}}</div>
        </div>
      </div>
      <div class="eyebrow">{{eyebrow}}</div>
      <h1>{{headline}}</h1>
      <p class="sub">{{subtext}}</p>
    </div>
    <div class="bottom">
      <div class="pillars">
        {{pillars}}
      </div>
      <div class="cta-row">
        <a class="cta-btn" href="#">{{cta}}</a>
        <span class="tg-handle">{{brand.telegram}}</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
