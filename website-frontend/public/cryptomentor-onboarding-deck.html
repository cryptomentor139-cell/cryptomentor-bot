<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=20260417-1" />
<link rel="icon" type="image/x-icon" href="/favicon.ico?v=20260417-1" />
<link rel="shortcut icon" href="/favicon.ico?v=20260417-1" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260417-1" />
<title>CryptoMentor AI - Cinematic Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#04060f;
  --bg2:#0b142b;
  --panel:rgba(8,14,28,.82);
  --panel-2:rgba(8,14,28,.92);
  --text:#e2e8f0;
  --muted:#94a3b8;
  --dim:#6f819b;
  --cyan:#22d3ee;
  --emerald:#34d399;
  --accent:var(--cyan);
  --accent-2:var(--emerald);
  --amber:#fbbf24;
  --rose:#fb7185;
  --indigo:#818cf8;
  --border:rgba(34,211,238,.22);
  --shadow:0 20px 56px rgba(2,8,18,.58);
  --glow:0 0 0 1px rgba(34,211,238,.2),0 14px 40px rgba(34,211,238,.1);
  --ease:cubic-bezier(.22,.78,.23,.99);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
  --vh:1vh;
  --topbar-h:74px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%}
html{
  scroll-behavior:smooth;
  scroll-padding-top:calc(var(--topbar-h) + var(--safe-top) + .9rem);
}
body{
  font-family:Manrope,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 560px at 10% -8%,rgba(34,211,238,.14),transparent 58%),
    radial-gradient(900px 560px at 94% 112%,rgba(52,211,153,.12),transparent 62%),
    linear-gradient(165deg,var(--bg),var(--bg2));
  overflow-x:hidden;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
  min-height:100dvh;
  overscroll-behavior-y:contain;
  -webkit-overflow-scrolling:touch;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:.28;
  background-image:
    linear-gradient(rgba(61,217,255,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(61,217,255,.05) 1px,transparent 1px);
  background-size:64px 64px;
  animation:gridDrift 24s linear infinite;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:.12;
  background:
    repeating-linear-gradient(180deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 1px,transparent 1px,transparent 3px);
}
@keyframes gridDrift{
  from{transform:translateY(0)}
  to{transform:translateY(64px)}
}

.bg-orb{
  position:fixed;
  width:560px;
  height:560px;
  border-radius:50%;
  filter:blur(60px);
  z-index:0;
  pointer-events:none;
  opacity:.25;
}
.bg-orb.a{background:rgba(34,211,238,.42);left:-180px;top:-200px;animation:floatA 13s ease-in-out infinite}
.bg-orb.b{background:rgba(52,211,153,.34);right:-160px;top:40%;animation:floatB 16s ease-in-out infinite}
@keyframes floatA{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,40px)}}
@keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(-70px,-50px)}}

.shell{
  position:relative;
  z-index:1;
  min-height:100dvh;
  display:block;
  padding:
    calc(.72rem + var(--safe-top))
    calc(.9rem + var(--safe-right))
    calc(.76rem + var(--safe-bottom))
    calc(.9rem + var(--safe-left));
}

.topbar,
.footerbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:.65rem;
  padding:.58rem .84rem;
  border-radius:999px;
  background:rgba(4,6,15,.82);
  border:1px solid var(--border);
  backdrop-filter:blur(18px);
  box-shadow:var(--glow);
}
.topbar{
  position:sticky;
  top:calc(.35rem + var(--safe-top));
  z-index:50;
  margin-bottom:.84rem;
}

.brand{
  display:flex;
  align-items:center;
  gap:.5rem;
  font-weight:800;
  font-size:.95rem;
  letter-spacing:.01em;
}

.brand-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  animation:beat 2.2s ease-in-out infinite;
}

@keyframes beat{
  0%,100%{box-shadow:0 0 0 0 rgba(34,211,238,.48)}
  50%{box-shadow:0 0 0 6px rgba(34,211,238,0)}
}

.top-right{display:flex;align-items:center;gap:.5rem}

.lang{
  display:flex;
  padding:4px;
  border-radius:999px;
  background:rgba(5,8,12,.85);
  border:1px solid var(--border);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
}

.lang button{
  border:none;
  background:transparent;
  color:var(--muted);
  font-size:.72rem;
  font-weight:800;
  padding:.38rem .72rem;
  border-radius:999px;
  cursor:pointer;
  transition:all .22s var(--ease);
}

.lang button.active{
  color:#04060f;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  box-shadow:0 0 20px rgba(34,211,238,.38);
}

#counter{font-size:.78rem;color:var(--muted);font-weight:700;letter-spacing:.06em;min-width:74px;text-align:right}

.deck{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:.86rem;
  overflow:visible;
}

.slide{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:.85rem;
  padding:1.1rem 1.18rem;
  opacity:1;
  transform:none;
  pointer-events:auto;
  overflow:visible;
  min-height:calc(100svh - var(--topbar-h) - 1.5rem - var(--safe-bottom));
  min-height:calc((var(--vh, 1vh) * 100) - var(--topbar-h) - 1.5rem - var(--safe-bottom));
  scroll-snap-align:start;
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:var(--shadow);
}

.s1{background:radial-gradient(740px 420px at 8% 0,rgba(34,211,238,.18),transparent 58%),linear-gradient(160deg,#060b18,#0c1632)}
.s2{background:radial-gradient(760px 430px at 92% 8%,rgba(251,113,133,.15),transparent 58%),linear-gradient(160deg,#091022,#131b39)}
.s3{background:radial-gradient(760px 430px at 48% -8%,rgba(129,140,248,.15),transparent 58%),linear-gradient(160deg,#071126,#0d1a39)}
.s4{background:radial-gradient(760px 420px at 90% 100%,rgba(52,211,153,.14),transparent 58%),linear-gradient(160deg,#071323,#101c33)}
.s5{background:radial-gradient(760px 420px at 10% 5%,rgba(34,211,238,.17),transparent 58%),linear-gradient(160deg,#071322,#101a33)}
.s6{background:radial-gradient(760px 420px at 94% 12%,rgba(34,211,238,.16),transparent 58%),linear-gradient(160deg,#071526,#0c1d3b)}
.s7{background:radial-gradient(760px 430px at 10% 95%,rgba(129,140,248,.17),transparent 58%),linear-gradient(160deg,#0a1126,#121c3b)}
.s8{background:radial-gradient(760px 430px at 50% -10%,rgba(34,211,238,.2),transparent 58%),linear-gradient(160deg,#06101f,#0a1f3b)}

.ey{
  align-self:flex-start;
  display:inline-flex;
  align-items:center;
  gap:.42rem;
  font-size:.64rem;
  font-weight:800;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--accent-2);
  border:1px solid rgba(61,217,255,.32);
  border-radius:999px;
  padding:.28rem .82rem;
  background:rgba(61,217,255,.1);
}

.ey::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent)}

h1,h2,h3{font-family:"Space Grotesk",Manrope,sans-serif;letter-spacing:-.03em}
h1{font-size:clamp(2.2rem,6.2vw,4.9rem);line-height:.95}
h2{font-size:clamp(1.25rem,2.8vw,2.35rem);line-height:1.08}

.grad{background:linear-gradient(135deg,var(--accent),var(--accent-2),var(--indigo));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.lead{font-size:clamp(.84rem,1.06vw,1rem);line-height:1.58;color:var(--muted);max-width:66ch}

.grid2{display:grid;grid-template-columns:1.04fr .96fr;gap:.6rem;flex:1;min-height:0}
.grid2.eq{grid-template-columns:1fr 1fr}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:.82rem .92rem;
  display:flex;
  flex-direction:column;
  gap:.58rem;
  box-shadow:var(--glow);
  backdrop-filter:blur(14px);
}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:.42rem}
.card{border:1px solid rgba(245,247,250,.12);border-radius:14px;background:rgba(255,255,255,.03);padding:.56rem .6rem}
.v{font-size:1.1rem;font-weight:800;line-height:1}
.l{font-size:.7rem;line-height:1.35;color:var(--muted);margin-top:.14rem}

.tags{display:flex;gap:.3rem;flex-wrap:wrap}
.tag{font-size:.63rem;font-weight:700;padding:.14rem .44rem;border-radius:999px;border:1px solid var(--border)}
.tc{color:var(--accent-2);border-color:rgba(61,217,255,.34);background:rgba(61,217,255,.08)}
.te{color:var(--accent);border-color:rgba(166,255,77,.34);background:rgba(166,255,77,.09)}
.ti{color:var(--indigo);border-color:rgba(129,140,248,.34);background:rgba(129,140,248,.08)}

.quote{border:1px solid rgba(61,217,255,.24);border-radius:12px;background:rgba(255,255,255,.03);padding:.48rem .56rem}
.quote p{font-size:.78rem;line-height:1.5}
.src{display:block;font-size:.64rem;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin-top:.2rem}

.list{list-style:none;display:flex;flex-direction:column;gap:.38rem}
.list li{display:flex;align-items:flex-start;gap:.48rem;font-size:.79rem;line-height:1.46;color:#d7e7fd}
.list li::before{content:"";width:15px;height:15px;margin-top:2px;border-radius:50%;flex-shrink:0;background-size:62%;background-repeat:no-repeat;background-position:center}
.good li::before{border:1px solid rgba(52,211,153,.35);background-color:rgba(52,211,153,.14);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 6l2.5 2.5L10 3' stroke='%2334d399' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E")}
.bad li::before{border:1px solid rgba(251,113,133,.35);background-color:rgba(251,113,133,.12);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 3l6 6M9 3L3 9' stroke='%23fb7185' stroke-width='1.7' fill='none' stroke-linecap='round'/%3E%3C/svg%3E")}

.reveal{opacity:0;transform:translateY(10px);transition:opacity .56s var(--ease),transform .56s var(--ease)}
.slide.is-visible .reveal{opacity:1;transform:translateY(0)}
.slide.is-visible .reveal:nth-child(2){transition-delay:.06s}
.slide.is-visible .reveal:nth-child(3){transition-delay:.12s}
.slide.is-visible .reveal:nth-child(4){transition-delay:.18s}
.slide.is-visible .reveal:nth-child(5){transition-delay:.24s}
.floating{animation:floatSoft 4s ease-in-out infinite}
@keyframes floatSoft{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
</style>
</head>
<body>
<div class="bg-orb a"></div>
<div class="bg-orb b"></div>
<div id="scrollProgress" aria-hidden="true"></div>
<div class="scroll-dots" id="scrollDots" aria-label="Section navigation"></div>

<div class="shell">
  <header class="topbar">
    <div class="brand"><span class="brand-dot"></span><span>CryptoMentor AI</span></div>
    <div class="top-right">
      <div class="lang">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="id">ID</button>
      </div>
      <span id="counter" aria-live="polite"></span>
    </div>
  </header>

  <main class="deck" id="deck">
    <section class="slide s1 active" data-slide="0">
      <div class="ey reveal" data-i18n="s1_ey"></div>
      <div class="grid2 cm-hero">
        <div class="panel reveal cm-hero-main">
          <h1><span data-i18n="s1_t1"></span><br /><span class="grad" data-i18n="s1_t2"></span></h1>
          <p class="lead" data-i18n="s1_sub"></p>
          <div class="cm-chip-row">
            <span class="tag te floating" data-i18n="s1_chip1"></span>
            <span class="tag tc floating" style="animation-delay:.12s" data-i18n="s1_chip2"></span>
            <span class="tag ti floating" style="animation-delay:.24s" data-i18n="s1_chip3"></span>
          </div>
          <div class="cards">
            <div class="card"><div class="v grad" data-i18n="s1_v1"></div><div class="l" data-i18n="s1_l1"></div></div>
            <div class="card"><div class="v" style="color:var(--accent)" data-i18n="s1_v2"></div><div class="l" data-i18n="s1_l2"></div></div>
            <div class="card"><div class="v" style="color:var(--amber)" data-i18n="s1_v3"></div><div class="l" data-i18n="s1_l3"></div></div>
            <div class="card"><div class="v" style="color:var(--accent-2)" data-i18n="s1_v4"></div><div class="l" data-i18n="s1_l4"></div></div>
          </div>
          <div class="cm-hero-actions">
            <button class="btn bp cm-hero-cta" onclick="window.location.href='https://cryptomentor.id'" data-i18n="s1_cta"></button>
          </div>
        </div>
        <div class="panel reveal cm-hero-status">
          <div class="tags"><span class="tag tc" data-i18n="s1_tag1"></span><span class="tag te" data-i18n="s1_tag2"></span><span class="tag ti" data-i18n="s1_tag3"></span></div>
          <h3 data-i18n="s1_h3"></h3>
          <p class="lead" data-i18n="s1_h3sub"></p>
          <div class="quote"><p data-i18n="s1_q1"></p><span class="src" data-i18n="s1_q1s"></span></div>
          <div class="quote"><p data-i18n="s1_q2"></p><span class="src" data-i18n="s1_q2s"></span></div>
        </div>
      </div>
    </section>

    <section class="slide s2" data-slide="1">
      <div class="ey reveal" data-i18n="s2_ey"></div>
      <h2 class="reveal"><span data-i18n="s2_t1"></span> <span class="grad" data-i18n="s2_t2"></span></h2>
      <div class="grid2 eq">
        <div class="panel reveal"><h3 data-i18n="s2_hl"></h3><ul class="list bad"><li data-i18n="s2_b1"></li><li data-i18n="s2_b2"></li><li data-i18n="s2_b3"></li><li data-i18n="s2_b4"></li></ul></div>
        <div class="panel reveal"><h3 data-i18n="s2_hr"></h3><div class="cards"><div class="card"><div class="v" style="color:var(--rose)" data-i18n="s2_i1v"></div><div class="l" data-i18n="s2_i1l"></div></div><div class="card"><div class="v" style="color:var(--amber)" data-i18n="s2_i2v"></div><div class="l" data-i18n="s2_i2l"></div></div><div class="card"><div class="v" style="color:var(--cyan)" data-i18n="s2_i3v"></div><div class="l" data-i18n="s2_i3l"></div></div></div><p class="lead" data-i18n="s2_sub"></p></div>
      </div>
    </section>

    <section class="slide s3" data-slide="2">
      <div class="ey reveal" data-i18n="s3_ey"></div>
      <h2 class="reveal"><span data-i18n="s3_t1"></span> <span class="grad" data-i18n="s3_t2"></span></h2>
      <p class="lead reveal" data-i18n="s3_sub"></p>
      <div class="panel reveal">
        <div class="regimes">
          <div class="reg active" id="r1"><div class="rt"><span data-i18n="s3_r1t"></span><span class="st" data-i18n="c_active"></span></div><p class="rd" data-i18n="s3_r1d"></p></div>
          <div class="reg" id="r2"><div class="rt"><span data-i18n="s3_r2t"></span><span class="st" data-i18n="c_standby"></span></div><p class="rd" data-i18n="s3_r2d"></p></div>
          <div class="reg" id="r3"><div class="rt"><span data-i18n="s3_r3t"></span><span class="st" data-i18n="c_standby"></span></div><p class="rd" data-i18n="s3_r3d"></p></div>
        </div>
        <div class="steps">
          <div class="step"><div class="n">1</div><span class="step-k" data-i18n="s3_k1"></span><p data-i18n="s3_s1"></p></div>
          <div class="step"><div class="n">2</div><span class="step-k" data-i18n="s3_k2"></span><p data-i18n="s3_s2"></p></div>
          <div class="step"><div class="n">3</div><span class="step-k" data-i18n="s3_k3"></span><p data-i18n="s3_s3"></p></div>
          <div class="step"><div class="n">4</div><span class="step-k" data-i18n="s3_k4"></span><p data-i18n="s3_s4"></p></div>
        </div>
      </div>
    </section>

    <section class="slide s4" data-slide="3">
      <div class="ey reveal" data-i18n="s4_ey"></div>
      <h2 class="reveal"><span data-i18n="s4_t1"></span> <span class="grad" data-i18n="s4_t2"></span></h2>
      <div class="grid2">
        <div class="panel reveal">
          <h3 data-i18n="s4_hl"></h3>
          <div class="meter"><div class="mh"><span data-i18n="s4_m1l"></span><span data-i18n="s4_m1v"></span></div><div class="mt"><div class="mf" data-meter="91"></div></div></div>
          <div class="meter"><div class="mh"><span data-i18n="s4_m2l"></span><span data-i18n="s4_m2v"></span></div><div class="mt"><div class="mf" data-meter="84"></div></div></div>
          <div class="meter"><div class="mh"><span data-i18n="s4_m3l"></span><span data-i18n="s4_m3v"></span></div><div class="mt"><div class="mf" data-meter="78"></div></div></div>
          <ul class="list good"><li data-i18n="s4_g1"></li><li data-i18n="s4_g2"></li><li data-i18n="s4_g3"></li></ul>
        </div>
        <div class="panel reveal">
          <h3 data-i18n="s4_hr"></h3>
          <div class="signals">
            <div class="row cm-signal-card ready">
              <div class="row-top"><span class="pair">BTCUSDT</span><span class="b bl" data-i18n="c_ready"></span></div>
              <div class="row-mid"><span class="conf">89%</span><span class="price" data-i18n="s4_p1"></span></div>
              <div class="cm-meter"><div class="track"><div class="fill" data-bar="89"></div></div></div>
              <p class="row-note" data-i18n="s4_n1"></p>
            </div>
            <div class="row cm-signal-card">
              <div class="row-top"><span class="pair">ETHUSDT</span><span class="b bw" data-i18n="c_watch"></span></div>
              <div class="row-mid"><span class="conf">73%</span><span class="price" data-i18n="s4_p2"></span></div>
              <div class="cm-meter"><div class="track"><div class="fill" data-bar="73"></div></div></div>
              <p class="row-note" data-i18n="s4_n2"></p>
            </div>
            <div class="row cm-signal-card">
              <div class="row-top"><span class="pair">SOLUSDT</span><span class="b bh" data-i18n="c_building"></span></div>
              <div class="row-mid"><span class="conf">58%</span><span class="price" data-i18n="s4_p3"></span></div>
              <div class="cm-meter"><div class="track"><div class="fill" data-bar="58"></div></div></div>
              <p class="row-note" data-i18n="s4_n3"></p>
            </div>
            <div class="row cm-signal-card ready">
              <div class="row-top"><span class="pair">XRPUSDT</span><span class="b bl" data-i18n="c_ready"></span></div>
              <div class="row-mid"><span class="conf">81%</span><span class="price" data-i18n="s4_p4"></span></div>
              <div class="cm-meter"><div class="track"><div class="fill" data-bar="81"></div></div></div>
              <p class="row-note" data-i18n="s4_n4"></p>
            </div>
          </div>
          <span class="live" data-i18n="s4_live"></span>
        </div>
      </div>
      <div class="panel reveal cm-engine-status">
        <div class="cm-engine-head">
          <h3 data-i18n="s4_engine_t"></h3>
          <span class="tag te" data-i18n="s4_engine_status"></span>
        </div>
        <div class="tags">
          <span class="tag tc" data-i18n="s4_chip1"></span>
          <span class="tag te" data-i18n="s4_chip2"></span>
          <span class="tag ti" data-i18n="s4_chip3"></span>
        </div>
        <div class="cm-engine-list">

const slides=[...document.querySelectorAll('.slide')]
const counter=document.getElementById('counter')
const dotsWrap=document.getElementById('scrollDots')
const progressBar=document.getElementById('scrollProgress')
const topbar=document.querySelector('.topbar')
const reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches

let lang='en'
let cur=0
let regimeIdx=0
let regimeTimer=null
let sectionObserver=null
let viewportRaf=0
const seenAnimation=new Set()

function applyLang(l){
  lang=l
  const d=T[l]
  document.documentElement.lang=l
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.dataset.i18n
    if(d[k]!==undefined) el.textContent=d[k]
  })
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l))
}

function updateCounter(){
  counter.textContent=`${String(cur+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`
}

function buildDots(){
  dotsWrap.innerHTML=''
  slides.forEach((_,i)=>{
    const dot=document.createElement('button')
    dot.type='button'
    dot.className='scroll-dot'
    dot.setAttribute('aria-label',`Go to section ${i+1}`)
    dot.onclick=()=>slides[i].scrollIntoView({behavior:reduced?'auto':'smooth',block:'start'})
    dotsWrap.appendChild(dot)
  })
}

function setActiveDot(){
  dotsWrap.querySelectorAll('.scroll-dot').forEach((dot,i)=>{
    dot.classList.toggle('is-active',i===cur)
  })
}

function updateProgress(){
  const scroller=document.scrollingElement||document.documentElement
  const viewportH=window.visualViewport?.height||window.innerHeight
  const max=scroller.scrollHeight-viewportH
  const y=window.scrollY||scroller.scrollTop||0
  const pct=max>0?Math.min(100,Math.max(0,(y/max)*100)):0
  progressBar.style.width=`${pct}%`
}

function syncViewportMetrics(){
  const viewportH=window.visualViewport?.height||window.innerHeight
  document.documentElement.style.setProperty('--vh',`${viewportH*0.01}px`)
  if(topbar){
    const h=Math.round(topbar.getBoundingClientRect().height)
    if(h>0) document.documentElement.style.setProperty('--topbar-h',`${h}px`)
  }
  updateProgress()
}

function queueViewportSync(){
  if(viewportRaf) return
  viewportRaf=requestAnimationFrame(()=>{
    viewportRaf=0
    syncViewportMetrics()
  })
}

function setRegimes(){
  ['r1','r2','r3'].forEach((id,i)=>{
    const c=document.getElementById(id)
    if(!c) return
    c.classList.toggle('active',i===regimeIdx)
    const s=c.querySelector('.st')
    if(s) s.textContent=i===regimeIdx?T[lang].c_active:T[lang].c_standby
  })
}

function startRegimes(){
  stopRegimes()
  setRegimes()
  if(reduced) return
  regimeTimer=setInterval(()=>{regimeIdx=(regimeIdx+1)%3;setRegimes()},2200)
}

function stopRegimes(){
  if(regimeTimer){
    clearInterval(regimeTimer)
    regimeTimer=null
  }
}

function animateSection(idx){
  const root=slides[idx]
  if(!root) return

  root.querySelectorAll('[data-meter]').forEach(el=>{
    const t=+el.dataset.meter
    el.style.width=reduced?`${t}%`:'0%'
    if(!reduced) setTimeout(()=>el.style.width=`${t}%`,70)
  })
  root.querySelectorAll('[data-bar]').forEach(el=>{
    const t=+el.dataset.bar
    el.style.width=reduced?`${t}%`:'0%'
    if(!reduced) setTimeout(()=>el.style.width=`${t}%`,120)
  })
  root.querySelectorAll('[data-count]').forEach(el=>{
    const target=+el.dataset.count
    const dec=+(el.dataset.dec||0)
    const pre=el.dataset.pre||''
    const suf=el.dataset.suf||''
    if(reduced){el.textContent=`${pre}${target.toFixed(dec)}${suf}`;return}
    let t0
    const dur=1080
    const tick=(ts)=>{
      if(!t0) t0=ts
      const p=Math.min((ts-t0)/dur,1)
      const e=1-Math.pow(1-p,3)
      el.textContent=`${pre}${(target*e).toFixed(dec)}${suf}`
      if(p<1) requestAnimationFrame(tick)
    }
    requestAnimationFrame(tick)
  })

  if(idx===3){
    root.querySelectorAll('.cm-signal-card').forEach((card,i)=>{
      if(reduced) return
      card.style.transform='translateY(10px)'
      card.style.opacity='0'
      setTimeout(()=>{
        card.style.transition='opacity .42s var(--ease), transform .42s var(--ease)'
        card.style.opacity='1'
        card.style.transform='translateY(0)'
      },70+(i*55))
    })
  }
}

function setCurrent(idx){
  if(idx<0 || idx>=slides.length) return
  cur=idx
  slides.forEach((s,i)=>s.classList.toggle('is-active',i===idx))
  updateCounter()
  setActiveDot()
  if(!seenAnimation.has(idx)){
    animateSection(idx)
    seenAnimation.add(idx)
  }
  if(idx===2) startRegimes()
  else stopRegimes()
}

function setupSectionObserver(){
  const visibleMap=new Map()
  sectionObserver=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('is-visible')
        visibleMap.set(entry.target,entry.intersectionRatio)
      }else{
        visibleMap.delete(entry.target)
      }
    })
    let bestIdx=cur
    let bestRatio=0
    visibleMap.forEach((ratio,el)=>{
      const i=slides.indexOf(el)
      if(i!==-1 && ratio>bestRatio){
        bestRatio=ratio
        bestIdx=i
      }
    })
    if(bestIdx!==cur && bestRatio>=0.3) setCurrent(bestIdx)
  },{threshold:[0.25,0.4,0.55,0.75]})

  slides.forEach(slide=>sectionObserver.observe(slide))
}

function jumpBy(delta){
  const next=Math.max(0,Math.min(slides.length-1,cur+delta))
  slides[next].scrollIntoView({behavior:reduced?'auto':'smooth',block:'start'})
}

document.querySelectorAll('.lang-btn').forEach(b=>b.onclick=()=>applyLang(b.dataset.lang))

window.addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();jumpBy(1)}
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();jumpBy(-1)}
})

window.addEventListener('scroll',updateProgress,{passive:true})
window.addEventListener('resize',queueViewportSync,{passive:true})
window.addEventListener('orientationchange',queueViewportSync,{passive:true})
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',queueViewportSync,{passive:true})
  window.visualViewport.addEventListener('scroll',queueViewportSync,{passive:true})
}

buildDots()
applyLang('en')
slides[0].classList.add('is-visible')
setCurrent(0)
syncViewportMetrics()
updateProgress()
setupSectionObserver()
</script>
